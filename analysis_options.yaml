include: package:flutter_lints/flutter.yaml

analyzer:
  # Elevate critical performance hints to hard warnings so they stand out
  errors:
    prefer_const_constructors: warning
    prefer_const_declarations: warning
    unnecessary_const: warning
    avoid_unnecessary_containers: warning
    sized_box_for_whitespace: warning
    use_build_context_synchronously: error # Critical async performance/safety issue

linter:
  rules:
    # --- 🏎️ CORE PERFORMANCE HINTS ---
    - prefer_const_constructors # Caches widgets at compile time; drastically cuts down runtime rebuild overhead.
    - prefer_const_declarations # Allocates memory exactly once for unchanging local evaluations.
    - prefer_const_constructors_in_immutables # Enforces const down the entire custom widget hierarchy tree.
    - prefer_const_literals_to_create_immutables # Auto-optimizes unchanging arrays inside Column or Row children blocks.

    # --- 🌳 WIDGET TREE CLEANUP (Reduces layout rendering passes) ---
    - avoid_unnecessary_containers # Prevents wasteful layout padding math by using simpler alternatives.
    - sized_box_for_whitespace # Replaces heavy Container() components with lightweight spacing layouts.
    - prefer_iterable_whereType # Optimizes list-parsing logic loops for much higher dataset filtering speeds.

    # --- 🧠 ASYNC & MEMORY LEAK PREVENTION ---
    - use_build_context_synchronously # Blocks unmounted context references, saving your application from framework crashes.
    - cancel_subscriptions # Triggers compilation warning alerts if a StreamSubscription is left hanging in memory.
    - close_sinks # Explicitly flags network sockets or data sinks that have not been safely closed.
    - avoid_print # Disables logging evaluations that slow down thread operations on live user devices.
